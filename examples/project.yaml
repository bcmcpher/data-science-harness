# skills are prompted to append. A validated schema will emerge later as tracking depth and the
# associated standards (maDMP, ethics, funder reporting, DataCite) are folded in.
#
# It is `datalad save`-d like any other file, so the administrative record is provenance-tracked
# alongside the science.

project:
  name: demo-study
  description: "Effect of X on outcome Y in cohort Z"
  created: 2026-07-10T14:30:00Z
  dataset_root: .
  stack: python

log:
